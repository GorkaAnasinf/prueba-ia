services:
  ollama:
    image: ollama/ollama:latest
    container_name: aiplatform-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=10m
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    gpus: all

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: aiplatform-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: aiplatform-open-webui
    restart: unless-stopped
    ports:
      - "3001:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://aiplatform-backend:8000/v1
      - OPENAI_API_KEY=${API_KEY}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - ENABLE_OLLAMA_API=false
    depends_on:
      - litellm

  postgres:
    image: postgres:16-alpine
    container_name: aiplatform-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aiplatform-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aiplatform-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    container_name: aiplatform-speaches
    restart: unless-stopped
    ports:
      - "8082:8000"
    volumes:
      - speaches_data:/root/.cache/huggingface
    environment:
      - ALLOW_ORIGINS=*
    gpus: all

  searxng:
    image: searxng/searxng:latest
    container_name: aiplatform-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-change-me-searxng-secret}
    volumes:
      - ./searxng:/etc/searxng:rw
    ports:
      - "8888:8080"


  n8n:
    image: n8nio/n8n:latest
    container_name: aiplatform-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-me-n8n-key}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=aiplatform-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_LOG_LEVEL=warn
      - N8N_SECURE_COOKIE=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - AI_PLATFORM_API_KEY=${API_KEY}
      - AI_PLATFORM_URL=http://aiplatform-backend:8000

      - TELEGRAM_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: aiplatform-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY}
      - LITELLM_BASE_URL=http://aiplatform-litellm:4000
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@aiplatform-postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@aiplatform-redis:6379
      - QDRANT_URL=http://aiplatform-qdrant:6333
      - OLLAMA_BASE_URL=http://aiplatform-ollama:11434
      - SEARXNG_URL=http://aiplatform-searxng:8080
    volumes:
      - ./backend/app:/app/app
      - ./obsidian-vault:/obsidian-vault
      - ./.git:/repo/.git
      - ./obsidian-vault:/repo/obsidian-vault
      - ~/.gitconfig:/root/.gitconfig:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
      qdrant:
        condition: service_started
      searxng:
        condition: service_started

volumes:
  ollama_data:
  open_webui_data:
  postgres_data:
  redis_data:
  qdrant_data:
  searxng_data:
  speaches_data:
  n8n_data: